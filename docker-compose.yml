services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: babycare
      POSTGRES_USER: babycare
      POSTGRES_PASSWORD: babycare
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babycare -d babycare"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "if [ -f prisma/schema.prisma ]; then npx prisma migrate deploy; fi && npm run start"

volumes:
  postgres-data:
